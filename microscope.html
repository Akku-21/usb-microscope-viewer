<!DOCTYPE html>
<html lang="en">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>USB Microscope Viewer</title>
    <style>
        * { margin: 0; padding: 0; box-sizing: border-box; }
        body {
            font-family: -apple-system, BlinkMacSystemFont, 'Segoe UI', Roboto, sans-serif;
            background: #1a1a1a;
            color: #fff;
            overflow: hidden;
            height: 100vh;
            display: flex;
            flex-direction: column;
        }
        .toolbar {
            background: #2d2d2d;
            padding: 10px 20px;
            display: flex;
            gap: 15px;
            align-items: center;
            border-bottom: 1px solid #444;
            flex-wrap: wrap;
        }
        .toolbar button {
            background: #4a9eff;
            color: white;
            border: none;
            padding: 10px 20px;
            border-radius: 4px;
            cursor: pointer;
            font-size: 14px;
            font-weight: 500;
            transition: background 0.2s;
        }
        .toolbar button:hover { background: #3a8eef; }
        .toolbar button.secondary {
            background: #555;
        }
        .toolbar button.secondary:hover { background: #666; }
        .toolbar button.warning {
            background: #ff6b35;
            animation: pulse 1.5s infinite;
        }
        .toolbar button.warning:hover { background: #e55a2b; }
        @keyframes pulse {
            0%, 100% { opacity: 1; }
            50% { opacity: 0.7; }
        }
        .toolbar button.active {
            background: #4a9eff;
            box-shadow: 0 0 0 2px #4a9eff;
        }
        .toolbar .info {
            margin-left: auto;
            color: #aaa;
            font-size: 12px;
        }
        .toolbar .info.frozen {
            color: #ff6b35;
            font-weight: bold;
        }
        .toolbar .info.reconnecting {
            color: #ffd93d;
            font-weight: bold;
        }
        .zoom-controls {
            display: flex;
            align-items: center;
            gap: 10px;
        }
        .zoom-controls button {
            padding: 8px 15px;
            font-size: 16px;
        }
        .zoom-level {
            min-width: 60px;
            text-align: center;
            font-family: monospace;
            font-size: 14px;
        }
        .profile-controls {
            display: flex;
            gap: 8px;
            align-items: center;
        }
        .profile-controls select {
            background: #3a3a3a;
            color: #fff;
            border: 1px solid #555;
            padding: 8px 12px;
            border-radius: 4px;
            font-size: 13px;
            min-width: 150px;
        }
        .profile-controls button {
            padding: 8px 12px;
            font-size: 12px;
        }
        .resolution-controls {
            display: flex;
            gap: 8px;
            align-items: center;
        }
        .resolution-controls select {
            background: #3a3a3a;
            color: #fff;
            border: 1px solid #555;
            padding: 8px 12px;
            border-radius: 4px;
            font-size: 13px;
        }
        .upscale-toggle {
            display: flex;
            align-items: center;
            gap: 5px;
            color: #aaa;
            font-size: 12px;
            cursor: pointer;
        }
        .upscale-toggle input[type="checkbox"] {
            cursor: pointer;
        }
        .filter-controls {
            display: flex;
            gap: 10px;
            align-items: center;
            padding: 10px 20px;
            background: #252525;
            border-bottom: 1px solid #444;
        }
        .filter-controls button {
            padding: 8px 16px;
            font-size: 12px;
            background: #3a3a3a;
            color: #ddd;
            border: 1px solid #555;
            border-radius: 4px;
            cursor: pointer;
            transition: all 0.2s;
        }
        .filter-controls button:hover { background: #4a4a4a; }
        .filter-controls button.active {
            background: #4a9eff;
            color: white;
            border-color: #4a9eff;
        }
        .slider-container {
            display: flex;
            align-items: center;
            gap: 8px;
            font-size: 12px;
        }
        .slider-container label {
            color: #aaa;
            min-width: 70px;
        }
        .slider-container input[type="range"] {
            width: 100px;
        }
        .slider-container span {
            min-width: 40px;
            text-align: center;
            font-family: monospace;
            color: #4a9eff;
        }
        .main-container {
            flex: 1;
            display: flex;
            overflow: hidden;
        }
        .video-container {
            flex: 1;
            display: flex;
            justify-content: center;
            align-items: center;
            background: #000;
            position: relative;
            cursor: grab;
            overflow: hidden;
        }
        .video-container.frozen {
            border: 3px solid #ff6b35;
        }
        .video-container.reconnecting {
            border: 3px solid #ffd93d;
        }
        .video-container:active { cursor: grabbing; }
        .video-container canvas {
            max-width: 100%;
            max-height: 100%;
            display: block;
        }
        .freeze-overlay {
            position: absolute;
            top: 50%;
            left: 50%;
            transform: translate(-50%, -50%);
            background: rgba(255, 107, 53, 0.9);
            color: white;
            padding: 20px 40px;
            border-radius: 8px;
            font-size: 18px;
            font-weight: bold;
            z-index: 100;
            display: none;
            pointer-events: none;
        }
        .freeze-overlay.show {
            display: block;
        }
        .sidebar {
            width: 250px;
            background: #2d2d2d;
            border-left: 1px solid #444;
            display: flex;
            flex-direction: column;
        }
        .sidebar h3 {
            padding: 15px;
            border-bottom: 1px solid #444;
            font-size: 14px;
            font-weight: 500;
        }
        .snapshot-list {
            flex: 1;
            overflow-y: auto;
            padding: 10px;
        }
        .snapshot-item {
            background: #3a3a3a;
            border-radius: 4px;
            margin-bottom: 10px;
            padding: 8px;
            cursor: pointer;
            transition: background 0.2s;
        }
        .snapshot-item:hover { background: #4a4a4a; }
        .snapshot-item img {
            width: 100%;
            border-radius: 2px;
            display: block;
            margin-bottom: 5px;
        }
        .snapshot-item .time {
            font-size: 11px;
            color: #888;
        }
        .start-screen {
            position: fixed;
            top: 0; left: 0; right: 0; bottom: 0;
            background: rgba(0,0,0,0.9);
            display: flex;
            flex-direction: column;
            justify-content: center;
            align-items: center;
            z-index: 1000;
        }
        .start-screen h1 {
            margin-bottom: 30px;
            font-size: 24px;
        }
        .start-screen button {
            background: #4a9eff;
            color: white;
            border: none;
            padding: 15px 40px;
            border-radius: 4px;
            cursor: pointer;
            font-size: 16px;
        }
        .hidden { display: none !important; }
        .help {
            position: fixed;
            bottom: 20px;
            left: 20px;
            background: rgba(0,0,0,0.8);
            padding: 10px 15px;
            border-radius: 4px;
            font-size: 12px;
            color: #aaa;
            pointer-events: none;
        }
        .help kbd {
            background: #444;
            padding: 2px 6px;
            border-radius: 3px;
            color: #fff;
        }
        /* Modal dialog styles */
        .modal {
            position: fixed;
            top: 0; left: 0; right: 0; bottom: 0;
            background: rgba(0,0,0,0.8);
            display: none;
            justify-content: center;
            align-items: center;
            z-index: 2000;
        }
        .modal.show {
            display: flex;
        }
        .modal-content {
            background: #2d2d2d;
            padding: 30px;
            border-radius: 8px;
            min-width: 400px;
        }
        .modal-content h3 {
            margin-bottom: 20px;
            font-size: 18px;
        }
        .modal-content input {
            width: 100%;
            padding: 10px;
            font-size: 14px;
            background: #3a3a3a;
            color: #fff;
            border: 1px solid #555;
            border-radius: 4px;
            margin-bottom: 20px;
        }
        .modal-content button {
            padding: 10px 20px;
            margin-right: 10px;
            border-radius: 4px;
            cursor: pointer;
            font-size: 14px;
        }
        .modal-content button.primary {
            background: #4a9eff;
            color: white;
            border: none;
        }
        .modal-content button.secondary {
            background: #555;
            color: white;
            border: none;
        }
    </style>
</head>
<body>
    <div class="start-screen" id="startScreen">
        <h1>USB Microscope Viewer</h1>
        <button onclick="startCamera()">Start Camera</button>
    </div>

    <div class="toolbar">
        <button onclick="takeSnapshot()">📷 Snapshot</button>
        <button id="reconnectBtn" class="secondary hidden" onclick="manualReconnect()">🔄 Reconnect</button>
        
        <div class="profile-controls">
            <select id="profileSelect" onchange="loadProfile()">
                <option value="">-- Select Profile --</option>
            </select>
            <button class="secondary" onclick="saveProfilePrompt()">💾 Save</button>
            <button class="secondary" onclick="deleteProfile()">🗑️ Del</button>
        </div>
        
        <div class="resolution-controls">
            <select id="resolutionSelect" onchange="changeResolution()">
                <option value="native">Native (Camera Max)</option>
                <option value="1920x1080">1920×1080 (1080p)</option>
                <option value="1280x720">1280×720 (720p)</option>
                <option value="640x480">640×480 (VGA)</option>
            </select>
            <label class="upscale-toggle">
                <input type="checkbox" id="upscaleCheck" onchange="toggleUpscale()">
                <span>Upscale 2×</span>
            </label>
        </div>
        
        <div class="zoom-controls">
            <button class="secondary" onclick="adjustZoom(-0.5)">−</button>
            <span class="zoom-level" id="zoomLevel">1.0x</span>
            <button class="secondary" onclick="adjustZoom(0.5)">+</button>
            <button class="secondary" onclick="resetView()">Reset</button>
        </div>
        <button class="secondary" onclick="toggleSidebar()">📁 Snapshots</button>
        <div class="info" id="statusInfo">
            <span id="resolution">-</span> | 
            <span id="status">Ready</span>
        </div>
    </div>

    <div class="filter-controls">
        <button id="btnSharpen" onclick="toggleFilter('sharpen')">🔧 Sharpen</button>
        <button id="btnEdge" onclick="toggleFilter('edge')">📐 Edges</button>
        <button id="btnInvert" onclick="toggleFilter('invert')">🔄 Invert</button>
        <button id="btnSolder" onclick="toggleFilter('solder')">⚡ Solder Mode</button>
        <button id="btnMono" onclick="toggleFilter('mono')">⚫ Mono</button>
        
        <div class="slider-container">
            <label>Contrast:</label>
            <input type="range" id="contrastSlider" min="-100" max="100" value="0" oninput="updateFilter('contrast', this.value)">
            <span id="contrastVal">0</span>
        </div>
        
        <div class="slider-container">
            <label>Brightness:</label>
            <input type="range" id="brightnessSlider" min="-100" max="100" value="0" oninput="updateFilter('brightness', this.value)">
            <span id="brightnessVal">0</span>
        </div>

        <div class="slider-container">
            <label>Saturation:</label>
            <input type="range" id="saturationSlider" min="-100" max="100" value="0" oninput="updateFilter('saturation', this.value)">
            <span id="saturationVal">0</span>
        </div>
    </div>

    <div class="main-container">
        <div class="video-container" id="videoContainer">
            <canvas id="videoCanvas"></canvas>
            <div class="freeze-overlay" id="freezeOverlay">⚠️ CAMERA FROZEN - RECONNECTING...</div>
        </div>
        
        <div class="sidebar hidden" id="sidebar">
            <h3>Snapshots</h3>
            <div class="snapshot-list" id="snapshotList"></div>
        </div>
    </div>

    <div class="help">
        <kbd>Scroll</kbd> Zoom | <kbd>Drag</kbd> Pan | <kbd>Space</kbd> Quick Save | <kbd>Shift+Space</kbd> Named Save | <kbd>1-5</kbd> Filters | Resolution + Upscale controls in toolbar
    </div>


    <div class="modal" id="profileModal">
        <div class="modal-content">
            <h3>Save Profile</h3>
            <input type="text" id="profileNameInput" placeholder="Enter profile name (e.g., Solder Mode)" autofocus>
            <div>
                <button class="primary" onclick="saveProfile()">Save</button>
                <button class="secondary" onclick="closeProfileModal()">Cancel</button>
            </div>
        </div>
    </div>

    <script>
        const canvas = document.getElementById('videoCanvas');
        const ctx = canvas.getContext('2d', { willReadFrequently: true });
        const container = document.getElementById('videoContainer');
        const zoomLevelEl = document.getElementById('zoomLevel');
        const resolutionEl = document.getElementById('resolution');
        const statusEl = document.getElementById('status');
        const statusInfo = document.getElementById('statusInfo');
        const freezeOverlay = document.getElementById('freezeOverlay');
        const reconnectBtn = document.getElementById('reconnectBtn');
        const profileSelect = document.getElementById('profileSelect');
        
        let video = document.createElement('video');
        let stream = null;
        let animationId = null;
        
        // View state
        let scale = 1;
        let offsetX = 0;
        let offsetY = 0;
        let isDragging = false;
        let lastX = 0;
        let lastY = 0;
        let snapshots = [];

        // Filter state
        let filters = {
            sharpen: false,
            edge: false,
            invert: false,
            solder: false,
            mono: false,
            contrast: 0,
            brightness: 0,
            saturation: 0
        };

        // Offscreen canvas for processing
        let procCanvas = document.createElement('canvas');
        let procCtx = procCanvas.getContext('2d');

        // Resolution and upscaling state
        let targetResolution = { width: 1920, height: 1080 };
        let upscaleFactor = 1;

        // FREEZE DETECTION STATE
        let isFrozen = false;
        let isReconnecting = false;
        let lastFrameTime = Date.now();
        let frameCallbackId = null;
        let watchdogTimer = null;
        let reconnectAttempts = 0;
        let savedDeviceId = null;
        const FREEZE_THRESHOLD_MS = 1500;
        const WATCHDOG_INTERVAL_MS = 500;
        const MAX_RECONNECT_ATTEMPTS = 5;

        // PROFILE MANAGEMENT
        const STORAGE_KEY = 'microscopeProfiles';
        
        function getProfiles() {
            try {
                return JSON.parse(localStorage.getItem(STORAGE_KEY)) || {};
            } catch {
                return {};
            }
        }
        
        function saveProfiles(profiles) {
            localStorage.setItem(STORAGE_KEY, JSON.stringify(profiles));
        }
        
        function updateProfileSelect() {
            const profiles = getProfiles();
            profileSelect.innerHTML = '<option value="">-- Select Profile --</option>';
            Object.keys(profiles).forEach(name => {
                const option = document.createElement('option');
                option.value = name;
                option.textContent = name;
                profileSelect.appendChild(option);
            });
        }
        
        function saveProfilePrompt() {
            document.getElementById('profileNameInput').value = '';
            document.getElementById('profileModal').classList.add('show');
            document.getElementById('profileNameInput').focus();
        }
        
        function closeProfileModal() {
            document.getElementById('profileModal').classList.remove('show');
        }
        
        function saveProfile() {
            const name = document.getElementById('profileNameInput').value.trim();
            if (!name) {
                alert('Please enter a profile name');
                return;
            }
            
            const profiles = getProfiles();
            profiles[name] = { ...filters };
            saveProfiles(profiles);
            updateProfileSelect();
            profileSelect.value = name;
            closeProfileModal();
            statusEl.textContent = `Profile "${name}" saved!`;
            setTimeout(() => statusEl.textContent = isFrozen ? 'FROZEN' : 'Live', 2000);
        }
        
        function loadProfile() {
            const name = profileSelect.value;
            if (!name) return;
            
            const profiles = getProfiles();
            if (profiles[name]) {
                filters = { ...profiles[name] };
                applyFilterUI();
                statusEl.textContent = `Profile "${name}" loaded!`;
                setTimeout(() => statusEl.textContent = isFrozen ? 'FROZEN' : 'Live', 2000);
            }
        }
        
        function deleteProfile() {
            const name = profileSelect.value;
            if (!name) {
                alert('Please select a profile to delete');
                return;
            }
            
            if (!confirm(`Delete profile "${name}"?`)) return;
            
            const profiles = getProfiles();
            delete profiles[name];
            saveProfiles(profiles);
            updateProfileSelect();
            statusEl.textContent = `Profile "${name}" deleted!`;
            setTimeout(() => statusEl.textContent = isFrozen ? 'FROZEN' : 'Live', 2000);
        }
        
        function applyFilterUI() {
            // Update button states
            ['sharpen', 'edge', 'invert', 'solder', 'mono'].forEach(filter => {
                const btn = document.getElementById('btn' + filter.charAt(0).toUpperCase() + filter.slice(1));
                if (btn) btn.classList.toggle('active', filters[filter]);
            });
            
            // Update sliders
            document.getElementById('contrastSlider').value = filters.contrast;
            document.getElementById('contrastVal').textContent = filters.contrast;
            document.getElementById('brightnessSlider').value = filters.brightness;
            document.getElementById('brightnessVal').textContent = filters.brightness;
            document.getElementById('saturationSlider').value = filters.saturation;
            document.getElementById('saturationVal').textContent = filters.saturation;
        }

        // Frame monitoring with requestVideoFrameCallback (Chrome/Edge)
        function setupFrameCallback() {
            if (!video.requestVideoFrameCallback) return;
            
            function onFrame(now, metadata) {
                if (!isReconnecting) {
                    lastFrameTime = Date.now();
                    if (isFrozen) {
                        setFrozen(false);
                    }
                }
                frameCallbackId = video.requestVideoFrameCallback(onFrame);
            }
            frameCallbackId = video.requestVideoFrameCallback(onFrame);
        }

        function cancelFrameCallback() {
            if (frameCallbackId && video.cancelVideoFrameCallback) {
                video.cancelVideoFrameCallback(frameCallbackId);
                frameCallbackId = null;
            }
        }

        // Watchdog timer for freeze detection
        function startWatchdog() {
            stopWatchdog();
            watchdogTimer = setInterval(() => {
                if (isReconnecting) return;
                
                const timeSinceLastFrame = Date.now() - lastFrameTime;
                if (timeSinceLastFrame > FREEZE_THRESHOLD_MS && !isFrozen) {
                    console.log('Freeze detected! Time since last frame:', timeSinceLastFrame);
                    setFrozen(true);
                    autoReconnect();
                }
            }, WATCHDOG_INTERVAL_MS);
        }

        function stopWatchdog() {
            if (watchdogTimer) {
                clearInterval(watchdogTimer);
                watchdogTimer = null;
            }
        }

        function setFrozen(frozen) {
            isFrozen = frozen;
            if (frozen) {
                container.classList.add('frozen');
                freezeOverlay.classList.add('show');
                statusEl.textContent = 'FROZEN';
                statusInfo.classList.add('frozen');
                reconnectBtn.classList.remove('hidden');
            } else {
                container.classList.remove('frozen');
                container.classList.remove('reconnecting');
                freezeOverlay.classList.remove('show');
                statusEl.textContent = 'Live';
                statusInfo.classList.remove('frozen');
                statusInfo.classList.remove('reconnecting');
                reconnectBtn.classList.add('hidden');
                reconnectAttempts = 0;
            }
        }

        function setReconnecting(reconnecting) {
            isReconnecting = reconnecting;
            if (reconnecting) {
                container.classList.add('reconnecting');
                freezeOverlay.textContent = `⚠️ RECONNECTING... (Attempt ${reconnectAttempts + 1})`;
                freezeOverlay.classList.add('show');
                statusEl.textContent = 'Reconnecting...';
                statusInfo.classList.add('reconnecting');
            } else {
                container.classList.remove('reconnecting');
                freezeOverlay.textContent = '⚠️ CAMERA FROZEN - RECONNECTING...';
            }
        }

        async function autoReconnect() {
            if (isReconnecting) return;
            
            reconnectAttempts++;
            if (reconnectAttempts > MAX_RECONNECT_ATTEMPTS) {
                statusEl.textContent = 'Reconnect failed - Click Reconnect button';
                reconnectBtn.classList.remove('hidden');
                reconnectBtn.classList.add('warning');
                return;
            }

            setReconnecting(true);
            
            if (stream) {
                stream.getTracks().forEach(track => track.stop());
            }
            cancelFrameCallback();
            
            await new Promise(r => setTimeout(r, 1000));
            
            try {
                await startCameraInternal();
                setFrozen(false);
                setReconnecting(false);
                console.log('Reconnection successful!');
            } catch (err) {
                console.error('Reconnection failed:', err);
                setReconnecting(false);
            }
        }

        async function manualReconnect() {
            reconnectAttempts = 0;
            reconnectBtn.classList.remove('warning');
            await autoReconnect();
        }

        async function changeResolution() {
            const resolution = document.getElementById('resolutionSelect').value;
            if (resolution === 'native') {
                targetResolution = { width: 1920, height: 1080 };
            } else {
                const [w, h] = resolution.split('x').map(Number);
                targetResolution = { width: w, height: h };
            }
            
            if (stream) {
                statusEl.textContent = 'Changing resolution...';
                stream.getTracks().forEach(track => track.stop());
                await startCameraInternal();
            }
        }
        
        function toggleUpscale() {
            upscaleFactor = document.getElementById('upscaleCheck').checked ? 2 : 1;
            if (video.readyState >= 2) {
                updateCanvasResolution();
            }
        }
        
        function updateCanvasResolution() {
            const displayWidth = video.videoWidth * upscaleFactor;
            const displayHeight = video.videoHeight * upscaleFactor;
            
            canvas.width = displayWidth;
            canvas.height = displayHeight;
            procCanvas.width = displayWidth;
            procCanvas.height = displayHeight;
            
            resolutionEl.textContent = `${video.videoWidth}x${video.videoHeight}` + 
                (upscaleFactor > 1 ? ` → ${displayWidth}x${displayHeight}` : '');
        }

        async function startCamera() {
            await startCameraInternal();
            document.getElementById('startScreen').classList.add('hidden');
            updateProfileSelect();
        }

        async function startCameraInternal() {
            try {
                statusEl.textContent = reconnectAttempts > 0 ? 'Reconnecting...' : 'Starting...';
                
                const devices = await navigator.mediaDevices.enumerateDevices();
                const videoDevices = devices.filter(d => d.kind === 'videoinput');
                
                let deviceId = savedDeviceId;
                if (!deviceId && videoDevices.length > 1) {
                    deviceId = videoDevices[videoDevices.length - 1].deviceId;
                }
                
                savedDeviceId = deviceId;
                
                const constraints = {
                    video: {
                        deviceId: deviceId ? { exact: deviceId } : undefined
                    }
                };
                
                if (document.getElementById('resolutionSelect').value !== 'native') {
                    constraints.video.width = { ideal: targetResolution.width };
                    constraints.video.height = { ideal: targetResolution.height };
                } else {
                    constraints.video.width = { ideal: 1920 };
                    constraints.video.height = { ideal: 1080 };
                }
                
                stream = await navigator.mediaDevices.getUserMedia(constraints);
                
                video.srcObject = stream;
                video.autoplay = true;
                video.playsInline = true;
                
                const videoTrack = stream.getVideoTracks()[0];
                if (videoTrack) {
                    videoTrack.onmute = () => {
                        console.log('Video track muted (frozen)');
                        setFrozen(true);
                        autoReconnect();
                    };
                    videoTrack.onunmute = () => {
                        console.log('Video track unmuted (resumed)');
                        setFrozen(false);
                    };
                    videoTrack.onended = () => {
                        console.log('Video track ended');
                        setFrozen(true);
                        autoReconnect();
                    };
                }
                
                await new Promise((resolve, reject) => {
                    video.onloadedmetadata = () => {
                        updateCanvasResolution();
                        resolve();
                    };
                    video.onerror = reject;
                    setTimeout(() => reject(new Error('Video load timeout')), 10000);
                });
                
                statusEl.textContent = 'Live';
                lastFrameTime = Date.now();
                
                setupFrameCallback();
                startWatchdog();
                
                if (!animationId) {
                    renderLoop();
                }
                
            } catch (err) {
                console.error('Camera error:', err);
                statusEl.textContent = 'Error: ' + err.message;
                throw err;
            }
        }

        function applyFilters(imageData) {
            const data = imageData.data;
            const width = imageData.width;
            const height = imageData.height;
            
            const output = new Uint8ClampedArray(data);
            
            const contrast = filters.contrast;
            const brightness = filters.brightness;
            const saturation = filters.saturation;
            
            const contrastFactor = (259 * (contrast + 255)) / (255 * (259 - contrast));
            
            for (let i = 0; i < data.length; i += 4) {
                let r = data[i];
                let g = data[i + 1];
                let b = data[i + 2];
                
                if (brightness !== 0) {
                    r = Math.max(0, Math.min(255, r + brightness));
                    g = Math.max(0, Math.min(255, g + brightness));
                    b = Math.max(0, Math.min(255, b + brightness));
                }
                
                if (contrast !== 0) {
                    r = Math.max(0, Math.min(255, contrastFactor * (r - 128) + 128));
                    g = Math.max(0, Math.min(255, contrastFactor * (g - 128) + 128));
                    b = Math.max(0, Math.min(255, contrastFactor * (b - 128) + 128));
                }
                
                if (saturation !== 0) {
                    const gray = 0.299 * r + 0.587 * g + 0.114 * b;
                    const satFactor = 1 + saturation / 100;
                    r = Math.max(0, Math.min(255, gray + (r - gray) * satFactor));
                    g = Math.max(0, Math.min(255, gray + (g - gray) * satFactor));
                    b = Math.max(0, Math.min(255, gray + (b - gray) * satFactor));
                }
                
                if (filters.mono) {
                    const gray = 0.299 * r + 0.587 * g + 0.114 * b;
                    r = g = b = gray;
                }
                
                if (filters.invert) {
                    r = 255 - r;
                    g = 255 - g;
                    b = 255 - b;
                }
                
                output[i] = r;
                output[i + 1] = g;
                output[i + 2] = b;
                output[i + 3] = data[i + 3];
            }
            
            if (filters.sharpen || filters.edge) {
                const kernel = filters.edge 
                    ? [-1, -1, -1, -1, 8, -1, -1, -1, -1]
                    : [0, -1, 0, -1, 5, -1, 0, -1, 0];
                
                const tempData = new Uint8ClampedArray(output);
                
                for (let y = 1; y < height - 1; y++) {
                    for (let x = 1; x < width - 1; x++) {
                        for (let c = 0; c < 3; c++) {
                            let sum = 0;
                            for (let ky = -1; ky <= 1; ky++) {
                                for (let kx = -1; kx <= 1; kx++) {
                                    const idx = ((y + ky) * width + (x + kx)) * 4 + c;
                                    const kidx = (ky + 1) * 3 + (kx + 1);
                                    sum += tempData[idx] * kernel[kidx];
                                }
                            }
                            const idx = (y * width + x) * 4 + c;
                            output[idx] = Math.max(0, Math.min(255, sum));
                        }
                    }
                }
            }
            
            if (filters.solder) {
                for (let i = 0; i < data.length; i += 4) {
                    let r = output[i];
                    let g = output[i + 1];
                    let b = output[i + 2];
                    
                    const brightness = 0.299 * r + 0.587 * g + 0.114 * b;
                    
                    if (brightness > 150) {
                        const boost = (brightness - 150) / 105 * 50;
                        r = Math.min(255, r + boost);
                        g = Math.min(255, g + boost);
                        b = Math.min(255, b + boost);
                    }
                    
                    b = Math.min(255, b * 1.1);
                    
                    output[i] = r;
                    output[i + 1] = g;
                    output[i + 2] = b;
                }
            }
            
            return new ImageData(output, width, height);
        }

        function renderLoop() {
            if (video.readyState >= 2 && !isFrozen) {
                procCtx.drawImage(video, 0, 0);
                
                let imageData = procCtx.getImageData(0, 0, procCanvas.width, procCanvas.height);
                
                const anyFilter = filters.sharpen || filters.edge || filters.invert || 
                                 filters.solder || filters.mono || filters.contrast !== 0 || 
                                 filters.brightness !== 0 || filters.saturation !== 0;
                
                if (anyFilter) {
                    imageData = applyFilters(imageData);
                }
                
                ctx.fillStyle = '#000';
                ctx.fillRect(0, 0, canvas.width, canvas.height);
                
                ctx.save();
                ctx.translate(offsetX, offsetY);
                ctx.scale(scale, scale);
                
                const tempCanvas = document.createElement('canvas');
                tempCanvas.width = imageData.width;
                tempCanvas.height = imageData.height;
                tempCanvas.getContext('2d').putImageData(imageData, 0, 0);
                
                ctx.drawImage(tempCanvas, 0, 0);
                ctx.restore();
            }
            
            animationId = requestAnimationFrame(renderLoop);
        }

        function toggleFilter(name) {
            filters[name] = !filters[name];
            document.getElementById('btn' + name.charAt(0).toUpperCase() + name.slice(1))
                .classList.toggle('active', filters[name]);
            
            if (name === 'solder' && filters.solder) {
                filters.sharpen = false;
                document.getElementById('btnSharpen').classList.remove('active');
            }
        }

        function updateFilter(type, value) {
            filters[type] = parseInt(value);
            document.getElementById(type + 'Val').textContent = value;
        }

        // Mouse wheel zoom
        container.addEventListener('wheel', (e) => {
            e.preventDefault();
            const delta = e.deltaY > 0 ? -0.1 : 0.1;
            adjustZoom(delta);
        }, { passive: false });

        function adjustZoom(delta) {
            const newScale = Math.max(0.5, Math.min(5, scale + delta));
            scale = newScale;
            zoomLevelEl.textContent = scale.toFixed(1) + 'x';
        }

        function resetView() {
            scale = 1;
            offsetX = 0;
            offsetY = 0;
            zoomLevelEl.textContent = '1.0x';
            
            filters = { sharpen: false, edge: false, invert: false, solder: false, mono: false, contrast: 0, brightness: 0, saturation: 0 };
            document.querySelectorAll('.filter-controls button').forEach(btn => btn.classList.remove('active'));
            document.getElementById('contrastSlider').value = 0;
            document.getElementById('contrastVal').textContent = '0';
            document.getElementById('brightnessSlider').value = 0;
            document.getElementById('brightnessVal').textContent = '0';
            document.getElementById('saturationSlider').value = 0;
            document.getElementById('saturationVal').textContent = '0';
            
            profileSelect.value = '';
        }

        // Pan with drag
        container.addEventListener('mousedown', (e) => {
            isDragging = true;
            lastX = e.clientX;
            lastY = e.clientY;
            container.style.cursor = 'grabbing';
        });

        window.addEventListener('mousemove', (e) => {
            if (!isDragging) return;
            
            const dx = e.clientX - lastX;
            const dy = e.clientY - lastY;
            
            offsetX += dx;
            offsetY += dy;
            
            lastX = e.clientX;
            lastY = e.clientY;
        });

        window.addEventListener('mouseup', () => {
            isDragging = false;
            container.style.cursor = 'grab';
        });

        // Keyboard shortcuts
        window.addEventListener('keydown', (e) => {
            if (e.code === 'Space') {
                e.preventDefault();
                if (e.shiftKey) {
                    takeSnapshotNamed();
                } else {
                    takeSnapshot();
                }
            }
            if (e.code === 'KeyR') {
                resetView();
            }
            if (e.code === 'Digit1') toggleFilter('sharpen');
            if (e.code === 'Digit2') toggleFilter('edge');
            if (e.code === 'Digit3') toggleFilter('invert');
            if (e.code === 'Digit4') toggleFilter('solder');
            if (e.code === 'Digit5') toggleFilter('mono');
        });

        function createSnapshotDataUrl() {
            const snapCanvas = document.createElement('canvas');
            snapCanvas.width = video.videoWidth;
            snapCanvas.height = video.videoHeight;
            const snapCtx = snapCanvas.getContext('2d');
            
            procCtx.drawImage(video, 0, 0);
            let imageData = procCtx.getImageData(0, 0, procCanvas.width, procCanvas.height);
            
            const anyFilter = filters.sharpen || filters.edge || filters.invert || 
                             filters.solder || filters.mono || filters.contrast !== 0 || 
                             filters.brightness !== 0 || filters.saturation !== 0;
            
            if (anyFilter) {
                imageData = applyFilters(imageData);
            }
            
            snapCtx.putImageData(imageData, 0, 0);
            return snapCanvas.toDataURL('image/jpeg', 0.95);
        }

        function takeSnapshot() {
            if (isFrozen) {
                alert('Camera is frozen - please reconnect first');
                return;
            }
            
            const dataUrl = createSnapshotDataUrl();
            const timestamp = new Date().toLocaleTimeString();
            
            snapshots.unshift({ dataUrl, timestamp });
            updateSnapshotList();
            
            const link = document.createElement('a');
            link.download = `microscope_${Date.now()}.jpg`;
            link.href = dataUrl;
            link.click();
            
            statusEl.textContent = `Snapshot saved!`;
            setTimeout(() => statusEl.textContent = isFrozen ? 'FROZEN' : 'Live', 2000);
        }

        function takeSnapshotNamed() {
            if (isFrozen) {
                alert('Camera is frozen - please reconnect first');
                return;
            }
            
            const dataUrl = createSnapshotDataUrl();
            const timestamp = new Date().toLocaleTimeString();
            
            snapshots.unshift({ dataUrl, timestamp });
            updateSnapshotList();
            
            const filename = prompt('Enter filename (without extension):', 'solder_joint');
            if (filename) {
                const link = document.createElement('a');
                link.download = `${filename}.jpg`;
                link.href = dataUrl;
                link.click();
                statusEl.textContent = `Saved as ${filename}.jpg!`;
            } else {
                statusEl.textContent = `Snapshot saved!`;
            }
            setTimeout(() => statusEl.textContent = isFrozen ? 'FROZEN' : 'Live', 2000);
        }

        function updateSnapshotList() {
            const list = document.getElementById('snapshotList');
            list.innerHTML = snapshots.map((snap, i) => `
                <div class="snapshot-item" onclick="viewSnapshot(${i})">
                    <img src="${snap.dataUrl}" alt="Snapshot">
                    <div class="time">${snap.timestamp}</div>
                </div>
            `).join('');
        }

        function viewSnapshot(index) {
            const snap = snapshots[index];
            window.open(snap.dataUrl, '_blank');
        }

        function toggleSidebar() {
            document.getElementById('sidebar').classList.toggle('hidden');
        }

        // Enter key in profile name input saves profile
        document.getElementById('profileNameInput').addEventListener('keydown', (e) => {
            if (e.code === 'Enter') {
                saveProfile();
            }
        });

        // Cleanup on page unload
        window.addEventListener('beforeunload', () => {
            stopWatchdog();
            cancelFrameCallback();
            if (stream) {
                stream.getTracks().forEach(track => track.stop());
            }
            if (animationId) {
                cancelAnimationFrame(animationId);
            }
        });
    </script>
</body>
</html>
